---
- name: Deploy the ArgoCD Helm chart
  kubernetes.core.helm:
    chart_ref: oci://ghcr.io/argoproj/argo-helm/argo-cd
    chart_version: 8.5.8
    create_namespace: true
    name: argocd
    namespace: argocd
    state: present
    atomic: true
    wait: true
    values:
      global:
        domain: "argocd.{{ ansible_local.tailscale.domain }}"
      configs:
        params:
          server.insecure: true
      server:
        autoscaling:
          enabled: true
          minReplicas: 2
        ingress:
          enabled: true
          annotations:
            tailscale.com/tags: "tag:argocd,tag:k8s"
          ingressClassName: tailscale
          hostname: argocd
          extraTls:
            - hosts:
                - argocd
      repoServer:
        autoscaling:
          enabled: true
          minReplicas: 2
      redis-ha:
        enabled: true
      controller:
        replicas: 1
      applicationSet:
        replicas: 2

- name: Define the Nippon-Koku repository
  kubernetes.core.k8s:
    state: present
    resource_definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ nausicaea.common.project_name }}"
        namespace: argocd
        labels:
          argocd.argoproj.io/secret-type: repository
      stringData:
        url: "{{ nausicaea.common.repo }}"
        project: "{{ nausicaea.common.project_name }}"

- name: Define the governance policy for the cluster bootstrap application
  kubernetes.core.k8s:
    state: present
    resource_definition:
      apiVersion: argoproj.io/v1alpha1
      kind: AppProject
      metadata:
        name: "appproj-{{ nausicaea.common.project_name }}"
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
      spec:
        sourceRepos:
          - "{{ nausicaea.common.repo }}"
          - https://bitnami-labs.github.io/sealed-secrets
          - https://pkgs.tailscale.com/helmcharts
          - https://charts.longhorn.io
          - https://kubetail-org.github.io/helm-charts
          - https://grafana.github.io/helm-charts
          - https://open-telemetry.github.io/opentelemetry-helm-charts
          - https://charts.jetstack.io
          - https://victoriametrics.github.io/helm-charts
        destinations:
          - server: https://kubernetes.default.svc
            namespace: "*"
          - server: https://kubernetes.default.svc
            namespace: ""
        clusterResourceWhitelist:
          - group: "*"
            kind: "*"

- name: Define the cluster bootstrap application
  kubernetes.core.k8s:
    state: present
    resource_definition:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: "app-{{ nausicaea.common.project_name }}"
        namespace: argocd
        finalizers:
          - resources-finalizer.argocd.argoproj.io
        annotations:
          argocd.argoproj.io/sync-wave: "1"
      spec:
        project: "appproj-{{ nausicaea.common.project_name }}"
        source:
          repoURL: "{{ nausicaea.common.repo }}"
          targetRevision: "{{ nausicaea.common.branch }}"
          path: applications
          directory:
            jsonnet:
              tlas:
                - name: source_repo
                  value: "{{ nausicaea.common.repo }}"
                - name: source_target_revision
                  value: "{{ nausicaea.common.branch }}"
        destination:
          server: https://kubernetes.default.svc
        syncPolicy:
          automated: {}
