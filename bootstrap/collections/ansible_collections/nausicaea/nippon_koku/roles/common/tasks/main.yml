---
- name: Ensure the custom fact directory exists
  ansible.builtin.file:
    path: "/etc/ansible/facts.d"
    state: directory
    recurse: true
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install custom fact modules
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/etc/ansible/facts.d/"
    owner: root
    group: root
    mode: "0755"
  become: true
  loop:
    - "lvm.fact"
    - "network.fact"
    - "tailscale.fact"
