---
- name: Add the custom APT repository for the T2 distribution independent packages
  vars:
    nausicaea:
      apt_custom_repo:
        keyring_url: "https://adityagarg8.github.io/t2-ubuntu-repo/KEY.gpg"
        keyring_checksum: sha256:7c9e7cd9927a36de8eee2fb472ecdd5c36d87d9f501248fda795f077d4aa43cb
        keyring_name: t2-ubuntu-repo.asc
        keyring_is_armored: false
        repo_url: "https://adityagarg8.github.io/t2-ubuntu-repo"
        repo_distribution: "./"
        repo_components: []
        repo_filename: "t2-ubuntu-repo_{{ ansible_distribution_release | lower }}"
  ansible.builtin.import_role:
    name: nausicaea.nippon_koku.apt_custom_repo

- name: Add the custom APT repository for the T2 distribution-specific packages
  vars:
    nausicaea:
      apt_custom_repo:
        keyring_url: "https://adityagarg8.github.io/t2-ubuntu-repo/KEY.gpg"
        keyring_checksum: sha256:7c9e7cd9927a36de8eee2fb472ecdd5c36d87d9f501248fda795f077d4aa43cb
        keyring_name: t2-ubuntu-repo.asc
        keyring_is_armored: false
        repo_url: "https://github.com/AdityaGarg8/t2-ubuntu-repo/releases/download/{{ ansible_distribution_release | lower }}"
        repo_distribution: "./"
        repo_components: []
        repo_filename: t2-ubuntu-repo
  ansible.builtin.import_role:
    name: nausicaea.nippon_koku.apt_custom_repo

- name: Configure APT pinning for the T2 repo
  ansible.builtin.blockinfile:
    path: "/etc/apt/preferences.d/t2-ubuntu-repo.pref"
    create: true
    owner: root
    group: root
    mode: "0644"
    state: present
    block: |
      Package: *
      Pin: origin adityagarg8.github.io
      Pin-Priority: 100

      Package: linux-t2-lts
      Pin: origin github.com
      Pin-Priority: 1001

      Package: applesmc-t2
      Pin: origin adityagarg8.github.io
      Pin-Priority: 1001

      Package: t2fanrd
      Pin: origin adityagarg8.github.io
      Pin-Priority: 1001
  become: true
  notify: Reload APT cache

- name: Install
  ansible.builtin.package:
    name:
      - linux-t2-lts
      - t2fanrd
    state: present
  become: true

- name: Enable and start the t2fanrd service
  ansible.builtin.service:
    name: t2fanrd
    state: started
    enabled: true
  become: true
