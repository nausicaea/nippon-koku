---
- name: Create a volume for logs
  community.general.lvol:
    vg: "{{ ansible_local.lvm.first_vg }}"
    lv: log
    size: "{{ nausicaea.common.var_log_lv_size }}"
    shrink: false
    resizefs: false
    state: present
  become: true
  when: ansible_local.lvm.first_vg is defined

- name: Create an ext4 filesystem for the logging volume
  community.general.filesystem:
    dev: "/dev/{{ ansible_local.lvm.first_vg }}/log"
    fstype: ext4
    resizefs: true
    state: present
  become: true
  register: cgf_output
  when: ansible_local.lvm.first_vg is defined

- name: DEBUG
  ansible.builtin.debug:
    var: cgf_output

- name: Create the logging mount directory
  ansible.builtin.file:
    path: /var/log
    state: directory
    owner: root
    group: root
    mode: "u=rwx,go=rx"
  become: true

- name: Check if the logging volume is already mounted
  ansible.builtin.set_fact:
    log_volume_mounted: >-
      {{
        ansible_mounts | selectattr('mount', 'equalto', '/var/log') | list | length > 0
      }}

- name: Mount the logging volume temporarily for data migration
  ansible.posix.mount:
    path: /mnt/log_migration
    src: "/dev/{{ ansible_local.lvm.first_vg }}/log"
    fstype: ext4
    state: ephemeral
  become: true
  when:
    - ansible_local.lvm.first_vg is defined
    - not log_volume_mounted

- name: Copy existing /var/log contents to the new volume
  ansible.builtin.command:
    cmd: cp -a /var/log/. /mnt/log_migration/
  become: true
  when:
    - ansible_local.lvm.first_vg is defined
    - not log_volume_mounted

- name: Unmount the temporary migration mount
  ansible.posix.mount:
    path: /mnt/log_migration
    state: absent
  become: true
  when:
    - ansible_local.lvm.first_vg is defined
    - not log_volume_mounted

- name: Mount the logging volume
  ansible.posix.mount:
    path: /var/log
    src: "/dev/{{ ansible_local.lvm.first_vg }}/log"
    fstype: ext4
    state: mounted
  become: true
  when: ansible_local.lvm.first_vg is defined
