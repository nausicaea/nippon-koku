---
- name: Add the custom APT repository for Tailscale
  vars:
    nausicaea:
      apt_custom_repo:
        keyring_url: "https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release | lower }}.noarmor.gpg"
        keyring_checksum: sha256:3e03dacf222698c60b8e2f990b809ca1b3e104de127767864284e6c228f1fb39
        keyring_name: tailscale-archive-keyring.gpg
        keyring_is_armored: false
        repo_url: "https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}"
        repo_distribution: "{{ ansible_distribution_release | lower }}"
        repo_components: ["main"]
        repo_filename: tailscale
  ansible.builtin.import_role:
    name: nausicaea.nippon_koku.apt_custom_repo

- name: Configure APT pinning for Tailscale
  ansible.builtin.blockinfile:
    path: "/etc/apt/preferences.d/tailscale.pref"
    create: true
    owner: root
    group: root
    mode: "0644"
    state: present
    block: |
      Package: *
      Pin: origin pkgs.tailscale.com
      Pin-Priority: 100

      Package: tailscale
      Pin: origin pkgs.tailscale.com
      Pin-Priority: 1001

      Package: tailscale-archive-keyring
      Pin: origin pkgs.tailscale.com
      Pin-Priority: 1001
  become: true
  notify: Reload APT cache

- name: Provision sysctl customizations for Tailscale
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/90-kubelet.conf
  become: true
  when: nausicaea.tailscale.enable_exit_node
  loop_control:
    label: "{{ item.name }}"
  loop:
    - name: net.ipv4.ip_forward
      value: "1"
    - name: net.ipv6.conf.all.forwarding
      value: "1"

- name: Ensure Tailscale is installed
  ansible.builtin.apt:
    name: tailscale
    state: present
  become: true

- name: Enable the Tailscale daemon
  ansible.builtin.service:
    name: tailscaled
    enabled: true
    state: started
  become: true

- name: Configure firewalld
  ansible.builtin.import_tasks:
    file: configure_firewalld.yml

- name: Install jmespath, a prerequisite for the filter `json_query`
  ansible.builtin.package:
    name: python3-jmespath
    state: present
  become: true

- name: Get the Tailscale status
  ansible.builtin.command:
    argv:
      - tailscale
      - status
      - "--json"
  register: tailscale_status_preauth
  changed_when: false
  check_mode: false
  become: true

- name: Is Tailscale logged in?
  ansible.builtin.set_fact:
    tailscale_is_logged_in: "{{ tailscale_status_preauth.stdout | from_json | json_query('Self.Online') }}"

- name: Connect to the tailnet
  ansible.builtin.command:
    argv:
      - tailscale
      - up
      - "--auth-key={{ nausicaea.tailscale.secrets.auth_key }}"
      - "--ssh"
  changed_when: true
  no_log: true
  become: true
  when: not tailscale_is_logged_in

- name: Get the Tailscale status again
  ansible.builtin.command:
    argv:
      - tailscale
      - status
      - "--json"
  register: tailscale_status_raw
  changed_when: false
  check_mode: false
  become: true

- name: What is the MagicDNS suffix and the host's DNS name?
  block:
    - name: Parse the output of Tailscale status as JSON
      ansible.builtin.set_fact:
        tailscale_status: "{{ tailscale_status_raw.stdout | from_json }}"

    - name: Determine the host's tailnet FQDN and the short hostname
      ansible.builtin.set_fact:
        ansible_local.tailscale.domain: "{{ tailscale_status | json_query('MagicDNSSuffix') }}"
        ansible_local.tailscale.host_fqdn: "{{ (tailscale_status | json_query('Self.DNSName')).rstrip('.') }}"

- name: Update the host name
  ansible.builtin.hostname:
    name: "{{ ansible_local.tailscale.host_fqdn }}"
  become: true

- name: Update the hosts file
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "^127\\.0\\.1\\.1"
    line: "127.0.1.1 {{ ansible_local.tailscale.host_fqdn }} {{ inventory_hostname_short }}"
    owner: root
    group: root
    mode: "0644"
    state: present
  become: true
