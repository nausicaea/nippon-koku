- name: Show a message about a pending K8s cluster upgrade
  ansible.builtin.debug:
    msg: "WARNING: Going to perform a cluster upgrade"
  changed_when: true
  when: nausicaea.k3s_common.cluster_upgrade

- name: Add the custom APT repository for Helm
  vars:
    nausicaea:
      apt_custom_repo:
        keyring_url: "https://packages.buildkite.com/helm-linux/helm-debian/gpgkey"
        keyring_checksum: sha256:dc6e3f91236491ab4af688c9cec2f5ea826817dc37181e59fc7a35e18800c4ab
        keyring_name: helm.gpg
        keyring_is_armored: true
        repo_url: "https://packages.buildkite.com/helm-linux/helm-debian/any/"
        repo_distribution: "any"
        repo_components: ["main"]
        repo_filename: helm
  ansible.builtin.import_role:
    name: nausicaea.apt_custom_repo

- name: Configure APT pinning for Helm
  ansible.builtin.blockinfile:
    path: "/etc/apt/preferences.d/helm.pref"
    create: true
    owner: root
    group: root
    mode: "0644"
    state: present
    block: |
      Package: *
      Pin: origin packages.buildkite.com
      Pin-Priority: 100

      Package: helm
      Pin: origin packages.buildkite.com
      Pin-Priority: 1001
  become: true
  notify: Reload APT cache

- name: Install the Kubernetes helper packages
  ansible.builtin.package:
    name: 
      - python3-kubernetes
      - helm
    state: present
  become: true

- name: Install Helm Diff (plugin)
  kubernetes.core.helm_plugin:
    plugin_path: https://github.com/databus23/helm-diff
    plugin_version: 3.13.0
    state: present

- name: Configure firewalld
  ansible.builtin.import_tasks:
    file: configure_firewalld.yml

- name: Create the K3s directory
  ansible.builtin.file:
    path: /var/lib/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "u=rwx,go="
  become: true

- name: Provision volumes always needed by K3s
  ansible.builtin.include_tasks: configure_k3s_volumes.yml
  loop_control:
    label: "{{ item.name }}"
  loop:
    - name: k3sstorage
      mount_dir: storage
      size: "{{ nausicaea.k3s_common.storage_lv_min_size }}"
    - name: k3sagent
      mount_dir: agent
      size: "{{ nausicaea.k3s_common.agent_lv_min_size }}"
    - name: k3sdata
      mount_dir: data
      size: "{{ nausicaea.k3s_common.data_lv_min_size }}"
    - name: k3sserver
      mount_dir: server
      size: "{{ nausicaea.k3s_common.server_lv_min_size }}"

- name: Set kernel parameters for file descriptors
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/90-file-descriptors.conf
  become: true
  loop:
    - name: fs.nr_open
      value: "4194304"  # 2 ** 22 (four times the default limit)
    # - name: fs.inotify.max_user_watches
    #   value: "524288"
    - name: fs.inotify.max_user_instances
      value: "512"

- name: Apply the CIS Hardening Benchmark
  ansible.builtin.import_tasks: 
    file: configure_hardening.yml

- name: Download the K3s installer script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    checksum: sha256:9d5fc42bf825d3e8dcc8682c8bac071b1de18019af81f85519ccbe5c919e0896
    dest: /usr/local/sbin/k3s-install
    owner: root
    group: root
    mode: "0500"
  become: true

- name: Does the K3s binary already exist?
  ansible.builtin.stat:
    path: "{{ nausicaea.k3s_common.vars.k3s_bin }}"
  register: k3s_bin
  failed_when: k3s_bin.stat is not defined

- name: Determine the network parameters and cluster upgrade facts
  ansible.builtin.set_fact:
    k3s_apiserver_url: "https://{{ nausicaea.k3s_common.secrets.apiserver_ip }}:6443/"
    k3s_tls_san: "{{ ([tailscale_host_fqdn, nausicaea.k3s_common.secrets.apiserver_ip] + tailscale_peer_fqdns) | join(',') }}"
    run_k3s_installer: "{{ (k3s_bin.stat is defined and not k3s_bin.stat.exists) or nausicaea.k3s_common.cluster_upgrade }}"
