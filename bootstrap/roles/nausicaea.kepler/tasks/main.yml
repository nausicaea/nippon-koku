---
- name: Create the kepler namespace
  kubernetes.core.k8s:
    state: present
    resource_definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: kepler
    wait: true

- name: Create all other Kepler resources
  kubernetes.core.k8s:
    state: present
    resource_definition: "{{ lookup('ansible.builtin.file', item) | from_yaml }}"
    wait: true
  loop:
    - 'files/cm-kepler.yaml'
    - 'files/svc-kepler.yaml'
    - 'files/ds-kepler.yaml'
    - 'files/otelcol-kepler.yaml'

