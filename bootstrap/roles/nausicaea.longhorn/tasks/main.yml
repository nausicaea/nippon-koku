---
- name: Install nfs-common and open-iscsi
  ansible.builtin.package:
    name:
      - nfs-common
      - open-iscsi
    state: present
  become: true

- name: Statically activate the iscsi_tcp and dm_crypt Kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
    persistent: present
  become: true
  loop:
    - iscsi_tcp
    - dm_crypt

- name: Enable the ISCSI Service
  ansible.builtin.service:
    name: iscsid
    enabled: true
    state: started
  become: true

- name: Disable multipath
  ansible.builtin.service:
    name: multipathd
    enabled: false
    state: stopped
  become: true
  when: "'os_ubuntu' in groups"

- name: Create the logical volume for Longhorn data
  community.general.lvol:
    vg: "{{ lvm_first_vg }}"
    lv: "{{ nausicaea.longhorn.vars.data_lv_name }}"
    size: "{{ nausicaea.longhorn.data_lv_min_size }}"
    shrink: false
    resizefs: true
    state: present
  become: true

- name: Create an ext4 filesystem for the Longhorn data volume
  community.general.filesystem:
    dev: "/dev/{{ lvm_first_vg }}/{{ nausicaea.longhorn.vars.data_lv_name }}"
    fstype: ext4
    resizefs: true
    state: present
  become: true

- name: Create the Longhorn data directory
  ansible.builtin.file:
    path: /var/lib/longhorn
    state: directory
    recurse: true
    owner: root
    group: root
    mode: "u=rwX,go="
  become: true

- name: Mount the Longhorn data volume
  ansible.posix.mount:
    path: /var/lib/longhorn
    src: "/dev/{{ lvm_first_vg }}/{{ nausicaea.longhorn.vars.data_lv_name }}"
    fstype: ext4
    state: mounted
  become: true

- name: Create the longhorn-system namespace
  kubernetes.core.k8s:
    resource_definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: longhorn-system

- name: Create the Longhorn backup secret
  kubernetes.core.k8s:
    resource_definition:
      apiVersion: v1
      kind: Secret
      type: Opaque
      immutable: true
      metadata:
        name: longhorn-aws-secret
        namespace: longhorn-system
        annotations:
          longhorn.io/backup-target: s3://nausicaea-longhorn@us-west-002/
      stringData:
        AWS_ACCESS_KEY_ID: "{{ nausicaea.longhorn.secrets.aws_access_key_id }}"
        AWS_SECRET_ACCESS_KEY: "{{ nausicaea.longhorn.secrets.aws_secret_access_key }}"
        AWS_ENDPOINTS: "{{ nausicaea.longhorn.secrets.aws_endpoints }}"
        VIRTUAL_HOSTED_STYLE: "{{ nausicaea.longhorn.secrets.virtual_hosted_style | string | lower }}"

- name: Register the Longhorn Helm repo
  kubernetes.core.helm_repository:
    name: longhorn
    url: https://charts.longhorn.io
    state: present

- name: Deploy the Longhorn Helm chart
  kubernetes.core.helm:
    chart_ref: longhorn/longhorn
    chart_version: 1.10.0
    create_namespace: false
    name: longhorn
    namespace: longhorn-system
    state: present
    atomic: true
    wait: true
    values:
      ingress:
        enabled: true
        annotations:
          tailscale.com/tags: "tag:longhorn,tag:k8s"
        ingressClassName: tailscale
        host: longhorn
        tls: true
      preUpgradeChecker:
        jobEnabled: false
      persistence:
        defaultClassReplicaCount: 2
        defaultDataLocality: best-effort
        reclaimPolicy: Delete
        backupTargetName: default
      defaultSettings:
        defaultReplicaCount: "2"
        defaultDataLocality: best-effort
      defaultBackupStore:
        backupTarget: "s3://nausicaea-longhorn@us-west-002/"
        backupTargetCredentialSecret: longhorn-aws-secret
        pollInterval: 300
      longhornUI:
        replicas: 1
