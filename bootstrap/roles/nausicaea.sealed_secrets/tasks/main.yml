---
- name: Deploy the Sealed Secrets keys
  kubernetes.core.k8s:
    resource_definition: "{{ nausicaea.sealed_secrets.secrets.sealing_keys }}"

- name: Deploy the Bitnami Sealed Secrets Helm chart
  kubernetes.core.helm:
    chart_ref: oci://registry-1.docker.io/bitnamicharts/sealed-secrets
    chart_version: 2.5.19
    create_namespace: false
    name: sealed-secrets
    namespace: kube-system
    state: present
    atomic: true
    wait: true
    set_values:
      - value: fullnameOverride=sealed-secrets-controller
        value_type: string
